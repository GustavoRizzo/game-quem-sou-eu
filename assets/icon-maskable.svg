<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Maskable icon: full-bleed background, glyph kept inside the ~80% safe zone
       so Android can crop it to any shape without clipping the "?". -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-size="58"
        font-weight="700" text-anchor="middle" fill="#4ecca3">?</text>
</svg>
