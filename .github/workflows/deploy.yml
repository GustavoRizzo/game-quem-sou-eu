name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm test

  deploy:
    needs: test # only deploy if tests pass
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      # Stage only the deployable site, leaving dev tooling out of the publish.
      - name: Stage site
        run: |
          mkdir _site
          cp -r index.html manifest.webmanifest sw.js assets lib pages _site/
          touch _site/.nojekyll
          # Stamp the service worker with this commit's SHA so each deploy gets a
          # unique cache version -> atomic, consistent updates (see sw.js).
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/" _site/sw.js

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
