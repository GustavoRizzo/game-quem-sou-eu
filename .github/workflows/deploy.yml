name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm test

  deploy:
    needs: test # only deploy if tests pass
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      # Stage only the deployable site, leaving dev tooling out of the publish.
      - name: Stage site
        env:
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          mkdir _site
          cp -r index.html index.js manifest.webmanifest sw.js assets lib pages _site/
          touch _site/.nojekyll
          # Stamp the service worker with this commit's SHA so each deploy gets a
          # unique cache version -> atomic, consistent updates (see sw.js).
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/" _site/sw.js

          # Wire up GA4 only when a Measurement ID is configured (repo Settings >
          # Secrets and variables > Actions > Variables > GA_MEASUREMENT_ID).
          # Skipped entirely otherwise, so the site still deploys without
          # analytics. The <script> tag is injected here, not checked into the
          # HTML, so every page gets it with nothing to keep in sync (see
          # lib/analytics.js).
          if [ -n "$GA_MEASUREMENT_ID" ]; then
            sed -i "s/__GA_MEASUREMENT_ID__/${GA_MEASUREMENT_ID}/" _site/lib/analytics.js
            find _site -name '*.html' | while read -r f; do
              rel=$(realpath --relative-to="$(dirname "$f")" _site/lib/analytics.js)
              sed -i "s#</head>#  <script type=\"module\" src=\"${rel}\"></script>\n</head>#" "$f"
            done
          fi

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
